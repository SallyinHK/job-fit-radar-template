name: Job Fit Radar

on:
  workflow_dispatch:
    inputs:
      debug_jobsdb:
        description: "Run JobsDB / JobStreet cloud diagnostic"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: job-fit-radar
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NOTIFIER: ntfy
      NTFY_SERVER: https://ntfy.sh
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      DATABASE_PATH: jobs.db
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'rules' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Write profile.md from GitHub Secret
        run: |
          cat > profile.md <<'EOF'
          ${{ secrets.PROFILE_MD }}
          EOF

      - name: Run cloud scan
        run: |
          python -u cloud_runner.py

      - name: Run JobsDB cloud diagnostic
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_jobsdb == true }}
        run: |
          python -u debug_jobsdb_cloud.py

      - name: Commit dashboard and cloud state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # cloud_runner may temporarily replace sources.yaml with fast/slow sources.
          # Do not commit that runtime change.
          git restore sources.yaml || true

          git status --short

          git add docs/index.html cloud_state.json

          if [ -f cloud_jobs.json ]; then
            git add cloud_jobs.json
          fi

          if [ -d debug_pages ]; then
            git add debug_pages
          fi

          if git diff --cached --quiet; then
            echo "No dashboard/state changes to commit."
          else
            git commit -m "Update job radar dashboard"
            git pull --rebase --autostash origin main
            git push
          fi
